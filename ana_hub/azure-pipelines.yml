trigger:
  - master

variables:
  POETRY_CACHE_DIR: '$(Pipeline.Workspace)\.poetry-cache'
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

pool:
  name: "Default"

steps:
  - script: |
      python -m pip install --upgrade pip
      pip install poetry
      python -m poetry config virtualenvs.in-project true
      python -m poetry install --no-root
    displayName: "1. 安裝環境與套件 (Poetry)"

  - script: |
      REM 使用 python -m pytest 並輸出為 JUnit XML 格式，以便 Azure 讀取報告
      python -m poetry run python -m pytest --junitxml=junit/test-results.xml
    displayName: "2. 執行 Pytest 測試"

  - task: PublishTestResults@2
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: "JUnit"
      testResultsFiles: "**/test-results.xml"
      testRunTitle: "Python Test Results"
    displayName: "3. 發佈測試報告至介面"

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: "$(Build.SourcesDirectory)"
      artifact: "ana-hub-app"
      publishLocation: "pipeline"
    displayName: "4. 發佈專案 Artifact"
